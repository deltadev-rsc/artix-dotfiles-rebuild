vim:ft=kitty

font_family JetBrainsMono Nerd Font
font_size 11

confirm_os_window_close 0

cursor_trail 3
cursor_style block

map ctrl+v paste_from_clipboard

# The basic colors
foreground              #ebdbb2
background              #1d2021
selection_foreground    #fbf1c7
selection_background    #458588

# Cursor colors
cursor                  #ebdbb2
cursor_text_color       #282828

# Scrollbar colors
scrollbar_handle_color  #83a598
scrollbar_track_color   #3c3836

# URL color when hovering with mouse
url_color               #8ec070

# Kitty window border colors
active_border_color     #fabd2f
inactive_border_color   #d65d0e
bell_border_color       #fe8019

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #282828
active_tab_background   #83a598
inactive_tab_foreground #ebdbb2
inactive_tab_background #282828
tab_bar_background      #3c3836

# Colors for marks (marked text in the terminal)
mark1_foreground #282828
mark1_background #83a598
mark2_foreground #282828
mark2_background #fabd2f
mark3_foreground #282828
mark3_background #8ec070

# The 16 terminal colors

# black
color0 #282828
color8 #504945

# red
color1 #cc241d
color9 #fb4934

# green
color2  #98971a
color10 #b8bb26

# yellow
color3  #d79921
color11 #fabd2f

# blue
color4  #458588
color12 #83a598

# magenta
color5  #b16286
color13 #d3869b

# cyan
color6  #689d6a
color14 #8ec070

# white
color7  #a89984
color15 #ebdbb2
